<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance AI Guardian</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0e11;
    color:white;
}
header{
    background:#11161d;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #F0B90B;
}
h1{
    color:#F0B90B;
    margin:0;
}
h2{
    color:#F0B90B;
}
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.section{
    background:#11161d;
    padding:25px;
    margin:20px 0;
    border-radius:12px;
}
input{
    padding:12px;
    width:70%;
    border-radius:8px;
    border:none;
}
button{
    padding:12px 25px;
    background:#F0B90B;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-left:10px;
}
#loader{
    display:none;
    margin:20px auto;
    border:6px solid #333;
    border-top:6px solid #F0B90B;
    border-radius:50%;
    width:50px;
    height:50px;
    animation:spin 1s linear infinite;
}
@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
.coin{
    margin:10px 0;
}
.green{
    color:#00ff9d;
}
.red{
    color:#ff4d4d;
}
#scannerBox{
    text-align:center;
    margin-top:20px;
    padding:20px;
    background:#0f141a;
    border-radius:12px;
}
</style>
</head>
<body>

<header>
    <h1>Binance AI Guardian</h1>
    <p>AI-powered Crypto Risk Scanner & Market Intelligence Dashboard</p>
</header>

<div class="container">

    <!-- Market Sentiment -->
    <div class="section">
        <h2>Market Sentiment</h2>
        <p id="sentiment">Loading market sentiment...</p>
    </div>

    <!-- Live Top Trending Coins -->
    <div class="section">
        <h2>Top Trending Coins</h2>
        <div id="trend"></div>
    </div>

    <!-- Live Prices -->
    <div class="section">
        <h2>Live Crypto Prices (Top 5 Coins)</h2>
        <div id="prices"></div>
    </div>

    <!-- Token Risk Scanner -->
    <div class="section" id="scannerBox">
        <h2>Token Risk Scanner</h2>
        <input id="tokenInput" placeholder="Enter Token (BTC / ETH / PEPE)">
        <button onclick="scanToken()">Scan</button>
        <div id="loader"></div>
        <div id="result" style="margin-top:15px;"></div>
    </div>

</div>

<script>
// Utility
function random(list){ return list[Math.floor(Math.random()*list.length)]; }

// Token Risk Scanner
function scanToken(){
    document.getElementById("loader").style.display="block";
    document.getElementById("result").innerHTML="";
    
    setTimeout(()=>{
        document.getElementById("loader").style.display="none";

        let trust=["AI Trust Score: 82%","AI Trust Score: 65%","AI Trust Score: 41%","AI Trust Score: 91%"];
        let liquidity=["Liquidity Risk: Low","Liquidity Risk: Medium","Liquidity Risk: High"];
        let whale=["Whale Activity: Low","Whale Activity: Medium","Whale Activity: High"];
        let contract=["Contract Safety: Safe","Contract Risk: Moderate","Contract Risk: High"];
        let alert=["No scam pattern detected","Unusual whale movement detected","Possible rug pull pattern","Suspicious trading activity"];
        
        document.getElementById("result").innerHTML=
            `<b>${random(trust)}</b><br>`+
            `${random(liquidity)}<br>`+
            `${random(whale)}<br>`+
            `${random(contract)}<br><br>`+
            `<span style="color:#F0B90B;">AI Alert: ${random(alert)}</span>`;
    },2000);
}

// Live Prices
async function loadPrices(){
    let url="https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=5&page=1";
    let res=await fetch(url);
    let data=await res.json();
    let html="";
    data.forEach(c=>{
        let color=c.price_change_percentage_24h>0?"green":"red";
        html+=`<div class="coin">${c.name} : $${c.current_price} <span class="${color}">(${c.price_change_percentage_24h.toFixed(2)}%)</span></div>`;
    });
    document.getElementById("prices").innerHTML=html;
}

// Market Sentiment
async function marketSentiment(){
    let url="https://api.coingecko.com/api/v3/global";
    let res=await fetch(url);
    let data=await res.json();
    let change=data.data.market_cap_change_percentage_24h_usd;
    let sentiment="Neutral";
    if(change>1) sentiment="Bullish 📈";
    if(change<-1) sentiment="Bearish 📉";
    document.getElementById("sentiment").innerText=
        `Market Sentiment: ${sentiment} | Market Cap Change: ${change.toFixed(2)}%`;
}

// Trending Coins
async function marketTrend(){
    let url="https://api.coingecko.com/api/v3/search/trending";
    let res=await fetch(url);
    let data=await res.json();
    let html="";
    data.coins.slice(0,5).forEach(c=>{
        html+=`<div>🔥 ${c.item.name}</div>`;
    });
    document.getElementById("trend").innerHTML=html;
}

// Initial Load
loadPrices();
marketSentiment();
marketTrend();

// Auto Refresh Every 20 sec
setInterval(loadPrices,20000);
setInterval(marketSentiment,20000);
setInterval(marketTrend,20000);
</script>

</body>
</html>
